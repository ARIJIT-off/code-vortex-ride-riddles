<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDE_RIDDLES — Smart Navigation · New Town</title>
    <meta name="description" content="Real-world adaptive routing for Action Area III, New Town, Kolkata.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ── Top Bar ───────────────────────────────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-brand">
            <span class="brand-icon">🗺</span>
            <span class="brand-name">RIDE<span class="brand-accent">_RIDDLES</span></span>
        </div>
        <div class="topbar-meta">
            <span class="meta-chip">Action Area III · New Town, Kolkata</span>
        </div>
    </header>

    <main class="map-stage">
        <!-- Leaflet full-screen map -->
        <div id="map"></div>

        <!-- ── Search Card (top-left) ──────────────────────────────────────── -->
        <div class="float-card search-card" id="search-card">
            <div class="card-title">Plan Route</div>

            <div class="field-group">
                <label for="source">From</label>
                <div class="select-wrap">
                    <select id="source">
                        <optgroup label="── New Town / Action Area III ──">
                            <option value="IEM Salt Lake">IEM Salt Lake</option>
                            <option value="St. Xaviers University">St. Xavier's University</option>
                            <option value="WB Judicial Academy">WB Judicial Academy</option>
                            <option value="NKDA Office">NKDA Office</option>
                            <option value="Hidco Bhaban">Hidco Bhaban</option>
                        </optgroup>
                        <optgroup label="── Eco Park / Action Area II ──">
                            <option value="Eco Park">Eco Park</option>
                            <option value="Biswa Bangla Gate">Biswa Bangla Gate</option>
                            <option value="City Centre 2">City Centre 2</option>
                            <option value="Rosedale Garden">Rosedale Garden</option>
                        </optgroup>
                        <optgroup label="── Salt Lake / Sector V ──">
                            <option value="City Centre 1">City Centre 1</option>
                            <option value="Salt Lake Stadium">Salt Lake Stadium</option>
                            <option value="Sector V">Sector V</option>
                        </optgroup>
                        <optgroup label="── Central Kolkata ──">
                            <option value="Howrah Bridge">Howrah Bridge</option>
                            <option value="Victoria Memorial">Victoria Memorial</option>
                            <option value="Park Street">Park Street</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Swap button -->
            <button id="swap-btn" class="swap-btn" title="Swap source and destination">⇅</button>

            <div class="field-group">
                <label for="destination">To</label>
                <div class="select-wrap">
                    <select id="destination">
                        <optgroup label="── New Town / Action Area III ──">
                            <option value="IEM Salt Lake">IEM Salt Lake</option>
                            <option value="St. Xaviers University">St. Xavier's University</option>
                            <option value="WB Judicial Academy">WB Judicial Academy</option>
                            <option value="NKDA Office">NKDA Office</option>
                            <option value="Hidco Bhaban">Hidco Bhaban</option>
                        </optgroup>
                        <optgroup label="── Eco Park / Action Area II ──">
                            <option value="Eco Park">Eco Park</option>
                            <option value="Biswa Bangla Gate">Biswa Bangla Gate</option>
                            <option value="City Centre 2">City Centre 2</option>
                            <option value="Rosedale Garden">Rosedale Garden</option>
                        </optgroup>
                        <optgroup label="── Salt Lake / Sector V ──">
                            <option value="City Centre 1">City Centre 1</option>
                            <option value="Salt Lake Stadium">Salt Lake Stadium</option>
                            <option value="Sector V">Sector V</option>
                        </optgroup>
                        <optgroup label="── Central Kolkata ──">
                            <option value="Howrah Bridge">Howrah Bridge</option>
                            <option value="Victoria Memorial">Victoria Memorial</option>
                            <option value="Park Street">Park Street</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="field-row">
                <div class="field-group half">
                    <label for="mode">Mode</label>
                    <div class="select-wrap">
                        <select id="mode">
                            <option value="foot">🚶 Walk</option>
                            <option value="ev">⚡ EV</option>
                            <option value="4-wheeler">🚗 Car</option>
                            <option value="2-wheeler">🏍 Bike</option>
                        </select>
                    </div>
                </div>
                <div class="field-group half">
                    <label for="preference">Prefer</label>
                    <div class="select-wrap">
                        <select id="preference">
                            <option value="smooth">🛣 Smooth</option>
                            <option value="shaded">🌿 Shaded</option>
                            <option value="shortest">⚡ Fastest</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="find-path-btn" class="btn-primary" id="find-route-btn">
                <span class="btn-icon">🔍</span> Find Route
            </button>
        </div>

        <!-- ── PATH TYPE Card (below search card) ─────────────────────────── -->
        <div class="float-card pathtype-card" id="pathtype-card" style="display:none;">
            <div class="pathtype-header">
                <span class="pathtype-icon">🛣</span>
                <span class="pathtype-title">PATH TYPE</span>
            </div>
            <div class="pathtype-rows" id="pathtype-rows"></div>
            <div class="pathtype-traffic" id="pathtype-traffic">
                <span class="traffic-label">TRAFFIC</span>
                <span class="traffic-badge" id="traffic-badge">—</span>
            </div>
        </div>

        <!-- Summary toggle button (always visible) -->
        <button class="summary-toggle open" id="summary-toggle" title="Toggle route summary">📋 Summary ▶</button>

        <!-- ── Route Summary Card (right side, collapsible) ──────────────── -->
        <div class="float-card summary-card" id="summary-card" style="display:none;">
            <div class="summary-title">Route Summary</div>
            <div class="summary-status" id="summary-status"></div>

            <!-- Quality breakdown bar -->
            <div class="quality-section" id="quality-section" style="display:none;">
                <div class="quality-title">Road Quality Breakdown</div>
                <div class="quality-bar">
                    <div class="qb-seg smooth" id="qb-smooth"></div>
                    <div class="qb-seg shaded" id="qb-shaded"></div>
                    <div class="qb-seg rough" id="qb-rough"></div>
                </div>
                <div class="quality-legend">
                    <span><span class="qdot smooth"></span>Smooth <b id="ql-smooth">0</b>%</span>
                    <span><span class="qdot shaded"></span>Shaded <b id="ql-shaded">0</b>%</span>
                    <span><span class="qdot rough"></span>Issues <b id="ql-rough">0</b>%</span>
                </div>
            </div>

            <!-- Alternative route buttons -->
            <div id="alt-section" style="display:none;">
                <div class="alt-label">Alternative Routes</div>
                <div id="alt-list" class="alt-list"></div>
            </div>
        </div>

        <!-- ── Legend card (bottom-right) ──────────────────────────────────── -->
        <div class="float-card legend-card">
            <div class="legend-row"><span class="lc-line main"></span><span>Main Route</span></div>
            <div class="legend-row"><span class="lc-line alt1"></span><span>Alternative 1</span></div>
            <div class="legend-row"><span class="lc-line alt2"></span><span>Alternative 2</span></div>
            <div class="legend-divider"></div>
            <div class="legend-row"><span class="lc-pin start"></span><span>Start</span></div>
            <div class="legend-row"><span class="lc-pin end"></span><span>End</span></div>
        </div>

        <!-- Loading overlay -->
        <div class="loading-overlay" id="loading-overlay" style="display:none;">
            <div class="spinner"></div>
            <span id="loading-text">Computing route via Bidirectional A*…</span>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mapRenderer.js"></script>
    <script src="app.js"></script>
</body>

</html>
