<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDE_RIDDLES — Smart Navigation · New Town</title>
    <meta name="description" content="Real-world adaptive routing for Action Area III, New Town, Kolkata.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ── Top Bar ───────────────────────────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-brand">
            <span class="brand-icon">🗺</span>
            <span class="brand-name">RIDE<span class="brand-accent">_RIDDLES</span></span>
        </div>

    </header>

    <main class="map-stage">
        <div id="map"></div>

        <!-- ── Drawer Tab Bar (left edge) ─────────────────────────────────── -->
        <div class="drawer-tabs" id="drawer-tabs">
            <button class="drawer-tab active" id="dtab-plan" data-panel="drawer-plan" title="Plan Route">
                <span class="dtab-icon">🔍</span>
                <span class="dtab-label">Plan</span>
            </button>
            <button class="drawer-tab locked" id="dtab-pathtype" data-panel="drawer-pathtype"
                title="Path Type (find a route first)">
                <span class="dtab-icon">🛣</span>
                <span class="dtab-label">Path</span>
                <span class="dtab-lock">🔒</span>
            </button>
            <button class="drawer-tab locked" id="dtab-summary" data-panel="drawer-summary"
                title="Route Summary (find a route first)">
                <span class="dtab-icon">📊</span>
                <span class="dtab-label">Summary</span>
                <span class="dtab-lock">🔒</span>
            </button>
        </div>

        <!-- ── Drawer Panels (slide out from left) ────────────────────────── -->

        <!-- PLAN ROUTE panel -->
        <div class="drawer-panel dp-open" id="drawer-plan">
            <div class="dp-header">Plan Route</div>
            <div class="dp-body">
                <div class="field-group">
                    <label for="source">From</label>
                    <div class="select-wrap">
                        <select id="source">
                            <option value="" disabled selected>Select location…</option>
                            <optgroup label="── New Town / Action Area III ──">
                                <option value="IEM Salt Lake">IEM Salt Lake</option>
                                <option value="St. Xaviers University">St. Xavier's University</option>
                                <option value="WB Judicial Academy">WB Judicial Academy</option>
                                <option value="NKDA Office">NKDA Office</option>
                                <option value="Hidco Bhaban">Hidco Bhaban</option>
                            </optgroup>
                            <optgroup label="── Eco Park / Action Area II ──">
                                <option value="Eco Park">Eco Park</option>
                                <option value="Biswa Bangla Gate">Biswa Bangla Gate</option>
                                <option value="City Centre 2">City Centre 2</option>
                                <option value="Rosedale Garden">Rosedale Garden</option>
                            </optgroup>
                            <optgroup label="── Salt Lake / Sector V ──">
                                <option value="City Centre 1">City Centre 1</option>
                                <option value="Salt Lake Stadium">Salt Lake Stadium</option>
                                <option value="Sector V">Sector V</option>
                            </optgroup>
                            <optgroup label="── Central Kolkata ──">
                                <option value="Howrah Bridge">Howrah Bridge</option>
                                <option value="Victoria Memorial">Victoria Memorial</option>
                                <option value="Park Street">Park Street</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <button id="swap-btn" class="swap-btn" title="Swap">⇅</button>

                <div class="field-group">
                    <label for="destination">To</label>
                    <div class="select-wrap">
                        <select id="destination">
                            <option value="" disabled selected>Select location…</option>
                            <optgroup label="── New Town / Action Area III ──">
                                <option value="IEM Salt Lake">IEM Salt Lake</option>
                                <option value="St. Xaviers University">St. Xavier's University</option>
                                <option value="WB Judicial Academy">WB Judicial Academy</option>
                                <option value="NKDA Office">NKDA Office</option>
                                <option value="Hidco Bhaban">Hidco Bhaban</option>
                            </optgroup>
                            <optgroup label="── Eco Park / Action Area II ──">
                                <option value="Eco Park">Eco Park</option>
                                <option value="Biswa Bangla Gate">Biswa Bangla Gate</option>
                                <option value="City Centre 2">City Centre 2</option>
                                <option value="Rosedale Garden">Rosedale Garden</option>
                            </optgroup>
                            <optgroup label="── Salt Lake / Sector V ──">
                                <option value="City Centre 1">City Centre 1</option>
                                <option value="Salt Lake Stadium">Salt Lake Stadium</option>
                                <option value="Sector V">Sector V</option>
                            </optgroup>
                            <optgroup label="── Central Kolkata ──">
                                <option value="Howrah Bridge">Howrah Bridge</option>
                                <option value="Victoria Memorial">Victoria Memorial</option>
                                <option value="Park Street">Park Street</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field-group half">
                        <label for="mode">Mode</label>
                        <div class="select-wrap">
                            <select id="mode">
                                <option value="" disabled selected>Select mode…</option>
                                <option value="foot">🚶 Walk</option>
                                <option value="ev">⚡ EV</option>
                                <option value="4-wheeler">🚗 Car</option>
                                <option value="2-wheeler">🏍 Bike</option>
                            </select>
                        </div>
                    </div>
                    <div class="field-group half">
                        <label for="preference">Prefer</label>
                        <div class="select-wrap">
                            <select id="preference">
                                <option value="" disabled selected>Select preference…</option>
                                <option value="smooth">🛣 Smooth</option>
                                <option value="shaded">🌿 Shaded</option>
                                <option value="shortest">⚡ Fastest</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="find-path-btn" class="btn-primary">
                    <span class="btn-icon">🔍</span> Find Route
                </button>
            </div>
        </div>

        <!-- PATH TYPE panel -->
        <div class="drawer-panel" id="drawer-pathtype">
            <div class="dp-header">Path Type</div>
            <div class="dp-body">
                <div id="pathtype-rows" class="pathtype-rows"></div>
                <div class="pathtype-traffic">
                    <span class="traffic-label">TRAFFIC</span>
                    <span class="traffic-badge" id="traffic-badge">—</span>
                </div>
            </div>
        </div>

        <!-- ROUTE SUMMARY panel -->
        <div class="drawer-panel" id="drawer-summary">
            <div class="dp-header">Route Summary</div>
            <div class="dp-body">
                <div class="summary-status" id="summary-status"></div>
                <div class="quality-section" id="quality-section" style="display:none;">
                    <div class="quality-title">Road Quality Breakdown</div>
                    <div class="quality-bar">
                        <div class="qb-seg smooth" id="qb-smooth"></div>
                        <div class="qb-seg shaded" id="qb-shaded"></div>
                        <div class="qb-seg rough" id="qb-rough"></div>
                    </div>
                    <div class="quality-legend">
                        <span><span class="qdot smooth"></span>Smooth <b id="ql-smooth">0</b>%</span>
                        <span><span class="qdot shaded"></span>Shaded <b id="ql-shaded">0</b>%</span>
                        <span><span class="qdot rough"></span>Issues <b id="ql-rough">0</b>%</span>
                    </div>
                </div>
                <div id="alt-section" style="display:none;">
                    <div class="alt-label">Alternative Routes</div>
                    <div id="alt-list" class="alt-list"></div>
                </div>

                <!-- Legend at bottom of summary -->
                <div class="summary-legend">
                    <div class="legend-divider"></div>
                    <div class="legend-row"><span class="lc-line main"></span><span>Main Route</span></div>
                    <div class="legend-row"><span class="lc-line alt1"></span><span>Alternative 1</span></div>
                    <div class="legend-row"><span class="lc-line alt2"></span><span>Alternative 2</span></div>
                    <div class="legend-row"><span class="lc-pin start"></span><span>Start</span></div>
                    <div class="legend-row"><span class="lc-pin end"></span><span>End</span></div>
                </div>
            </div>
        </div>

        <!-- Loading overlay -->
        <div class="loading-overlay" id="loading-overlay" style="display:none;">
            <div class="spinner"></div>
            <span id="loading-text">Computing route…</span>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mapRenderer.js"></script>
    <script src="app.js"></script>

    <!-- ── Drawer Tab Logic ────────────────────────────────────────────── -->
    <script>
        (function () {
            var tabs = document.querySelectorAll('.drawer-tab');
            var panels = document.querySelectorAll('.drawer-panel');
            var activePanel = document.getElementById('drawer-plan');

            tabs.forEach(function (tab) {
                tab.addEventListener('click', function () {
                    if (tab.classList.contains('locked')) return;
                    var panelId = tab.getAttribute('data-panel');
                    var panel = document.getElementById(panelId);

                    // Toggle off if already active
                    if (activePanel === panel) {
                        panel.classList.remove('dp-open');
                        tab.classList.remove('active');
                        activePanel = null;
                        return;
                    }

                    // Close all, open this one
                    panels.forEach(function (p) { p.classList.remove('dp-open'); });
                    tabs.forEach(function (t) { t.classList.remove('active'); });
                    panel.classList.add('dp-open');
                    tab.classList.add('active');
                    activePanel = panel;
                });
            });

            // Called by app.js after a route is found
            window.unlockDrawerTabs = function () {
                document.getElementById('dtab-pathtype').classList.remove('locked');
                document.getElementById('dtab-summary').classList.remove('locked');
                var locks = document.querySelectorAll('.dtab-lock');
                locks.forEach(function (l) { l.style.display = 'none'; });
            };
        })();
    </script>
</body>

</html>
